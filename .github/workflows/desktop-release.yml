name: Desktop Release

# Builds native desktop installers and attaches them to the release for a `vX.Y.Z` tag.
# Runs alongside release.yml (which ships the CLI binaries) — both upload to the same release.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  installers:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            label: macOS (universal)
            args: "--target universal-apple-darwin"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: ubuntu-22.04
            label: Linux (.deb / .AppImage)
            args: ""
            rust-targets: ""
          - platform: windows-latest
            label: Windows (.msi / .exe)
            args: ""
            rust-targets: ""
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ matrix.platform }}-tauri-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            build-essential \
            file \
            libxdo-dev \
            libssl-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release installers
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Note: installers are unsigned. To sign, add the relevant secrets
          # (Apple Developer ID / Windows cert) and wire them here.
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Trackly ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
