name: Release

# Cut a release by pushing a tag, e.g.  git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release -p trackly-cli -p trackly-mcp --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          name="trackly-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir -p dist
          tar -czf "dist/${name}.tar.gz" -C "target/${{ matrix.target }}/release" trackly trackly-mcp
          shasum -a 256 "dist/${name}.tar.gz" > "dist/${name}.tar.gz.sha256"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          name="trackly-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir -p dist
          7z a "dist/${name}.zip" \
            "./target/${{ matrix.target }}/release/trackly.exe" \
            "./target/${{ matrix.target }}/release/trackly-mcp.exe"
          sha256sum "dist/${name}.zip" > "dist/${name}.zip.sha256"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          draft: false
          generate_release_notes: true
